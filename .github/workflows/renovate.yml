name: Renovate

on:
  merge_group:
  schedule:
    - cron: "0 6 * * *"
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      lanes:
        description: velnor (default) | github | both
        type: choice
        default: velnor
        options: [velnor, github, both]

concurrency:
  group: renovate-${{ github.ref }}
  cancel-in-progress: false

jobs:
  renovate:
    name: Renovate (${{ matrix.config.lane }})
    permissions:
      contents: read
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON((github.event_name == 'workflow_dispatch' && inputs.lanes == 'both') && '[{"lane":"Velnor","runner":["self-hosted","velnor-target-mvp"],"writer":true},{"lane":"GitHub","runner":"ubuntu-26.04","writer":false}]' || (github.event_name == 'workflow_dispatch' && inputs.lanes == 'github') && '[{"lane":"GitHub","runner":"ubuntu-26.04","writer":true}]' || '[{"lane":"Velnor","runner":["self-hosted","velnor-target-mvp"],"writer":true}]') }}
    runs-on: ${{ matrix.config.runner }}
    env:
      RENOVATE_TOKEN: ${{ secrets.RENOVATE_TOKEN }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Cache Renovate repository cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: .renovate/cache
          key: renovate-${{ matrix.config.lane }}-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            renovate-${{ matrix.config.lane }}-${{ runner.os }}-
      - name: Grant Renovate ownership without world-write
        run: |
          install -d -m 0755 .renovate .renovate/cache .renovate/repos
          if [ "$(id -u)" -eq 0 ]; then
            chown -R 12021:12021 .renovate
          else
            sudo chown -R 12021:12021 .renovate
          fi
          chmod -R u+rwX,go+rX .renovate
      - name: Self-hosted Renovate
        if: matrix.config.writer && env.RENOVATE_TOKEN != ''
        uses: renovatebot/github-action@3064367f740a1a91cca218698a63902689cce200 # v46.1.20
        with:
          token: ${{ env.RENOVATE_TOKEN }}
        env:
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          RENOVATE_ONBOARDING: false
          RENOVATE_GIT_AUTHOR: "Renovate Bot <renovate@whitesourcesoftware.com>"
          RENOVATE_REPOSITORY_CACHE: enabled
          RENOVATE_BASE_DIR: /github/workspace/.renovate
          LOG_LEVEL: debug
      - name: Explain non-writer or missing-token lane
        if: ${{ !matrix.config.writer || env.RENOVATE_TOKEN == '' }}
        run: echo 'Read-only comparison lane or token unavailable; Renovate mutation skipped.'

  renovate-required:
    needs: [renovate]
    if: always()
    name: Renovate required (${{ matrix.config.lane }})
    permissions: {}
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON((github.event_name == 'workflow_dispatch' && inputs.lanes == 'both') && '[{"lane":"Velnor","runner":["self-hosted","velnor-target-mvp"],"writer":true},{"lane":"GitHub","runner":"ubuntu-26.04","writer":false}]' || (github.event_name == 'workflow_dispatch' && inputs.lanes == 'github') && '[{"lane":"GitHub","runner":"ubuntu-26.04","writer":true}]' || '[{"lane":"Velnor","runner":["self-hosted","velnor-target-mvp"],"writer":true}]') }}
    runs-on: ${{ matrix.config.runner }}
    steps:
      - env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: echo "$NEEDS_JSON" | jq -e 'to_entries | map(.value.result) | any(. == "failure" or . == "cancelled") | not' >/dev/null
