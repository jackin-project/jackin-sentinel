name: Renovate

on:
  merge_group:
  schedule:
    - cron: "0 6 * * *"
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  renovate:
    runs-on: ubuntu-24.04
    env:
      RENOVATE_TOKEN: ${{ secrets.RENOVATE_TOKEN }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Cache Renovate repository cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: /tmp/renovate/cache
          key: renovate-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            renovate-${{ runner.os }}-
      - name: Fix Renovate cache ownership for run
        run: |
          docker pull ghcr.io/renovatebot/renovate:43
          renovate_uid="$(docker image inspect ghcr.io/renovatebot/renovate:43 --format '{{ .Config.User }}')"
          renovate_uid="${renovate_uid%%:*}"
          sudo mkdir -p /tmp/renovate/cache /tmp/renovate/repos
          sudo chown -R "${renovate_uid:-12021}:0" /tmp/renovate
      - name: Self-hosted Renovate
        if: ${{ env.RENOVATE_TOKEN != '' }}
        uses: renovatebot/github-action@8217b3fc286df088d7c27f3255fe8414463bc0fd # v46.1.15
        with:
          token: ${{ env.RENOVATE_TOKEN }}
        env:
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          RENOVATE_ONBOARDING: false
          # Pin the git author identity so the DCO sign-off trailer in
          # renovate.json::commitBody always matches the commit-author
          # email. DCO-2 requires the Signed-off-by email to equal the
          # commit-author email; without this pin, a change in Renovate's
          # default author would silently break DCO on every Renovate PR.
          RENOVATE_GIT_AUTHOR: "Renovate Bot <renovate@whitesourcesoftware.com>"
          RENOVATE_REPOSITORY_CACHE: enabled
          LOG_LEVEL: debug
      - name: Skip Renovate without token
        if: ${{ env.RENOVATE_TOKEN == '' }}
        run: echo "RENOVATE_TOKEN is not configured; skipping Renovate."
      - name: Fix Renovate cache ownership for save
        if: always()
        run: sudo chown -R "$(whoami)" /tmp/renovate 2>/dev/null || true
