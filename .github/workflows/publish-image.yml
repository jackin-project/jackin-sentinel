name: Publish Image

concurrency:
  # Serialize publishes per branch so simultaneous merges (for example
  # several Renovate PRs landing within seconds) do not race on the
  # :latest tag and leave it pointing at an older commit's image. The
  # newest push wins, keeping :latest current so launches can reuse the
  # published base instead of rebuilding from the workspace Dockerfile.
  group: publish-image-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      lane:
        description: |
          Runner lane. Publish mutates registry state, so it runs on one
          lane only: github (default) or velnor.
        type: choice
        default: github
        options: [github, velnor]

jobs:
  publish:
    uses: jackin-project/jackin-role-action/.github/workflows/publish.yml@918e0958a2f695087b8e262ed90d3ed7c09c787a # pinned
    permissions:
      contents: read
      id-token: write
    with:
      # Use native arm64 runners on the github lane. When both architectures
      # use the same runner label, the reusable workflow builds arm64 via QEMU.
      runner-amd64: ${{ (github.event_name == 'workflow_dispatch' && inputs.lane == 'velnor') && 'velnor-target-mvp' || 'ubuntu-24.04' }}
      runner-arm64: ${{ (github.event_name == 'workflow_dispatch' && inputs.lane == 'velnor') && 'velnor-target-mvp' || 'ubuntu-24.04-arm' }}
      runner-merge: ${{ (github.event_name == 'workflow_dispatch' && inputs.lane == 'velnor') && 'velnor-target-mvp' || 'ubuntu-24.04' }}
    secrets:
      registry-username: ${{ secrets.DOCKERHUB_USERNAME }}
      registry-password: ${{ secrets.DOCKERHUB_TOKEN }}
      github-readonly-token: ${{ secrets.GH_READONLY_TOKEN }}
