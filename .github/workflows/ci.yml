name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      lanes:
        description: |
          Which runner(s) to run on. Default github; use both for parity runs.
        type: choice
        default: github
        options: [github, velnor, both]

jobs:
  matrix-setup:
    name: Select runner lane
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      configs: ${{ steps.set.outputs.configs }}
    steps:
      - id: set
        env:
          LANES: ${{ github.event_name == 'workflow_dispatch' && inputs.lanes || 'github' }}
        run: |
          github='{"lane":"GitHub","runner":"\"ubuntu-24.04\""}'
          velnor='{"lane":"Velnor","runner":"[\"self-hosted\",\"velnor-target-mvp\"]"}'
          case "$LANES" in
            velnor) configs="[$velnor]" ;;
            both)   configs="[$github,$velnor]" ;;
            *)      configs="[$github]" ;;
          esac
          echo "configs=$configs" >> "$GITHUB_OUTPUT"

  validate:
    needs: matrix-setup
    name: validate (${{ matrix.config.lane }})
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON(needs.matrix-setup.outputs.configs) }}
    runs-on: ${{ fromJSON(matrix.config.runner) }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: jackin-project/jackin-role-action@80a1acd07257a23b441c546e6fcad12239ef7626 # pinned
        with:
          jackin-version: latest-build
          # Warm PR CI from the last published image's registry layer cache.
          registry-cache-image: docker.io/projectjackin/jackin-sentinel
