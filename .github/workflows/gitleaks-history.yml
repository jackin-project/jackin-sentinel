name: gitleaks history

on:
  schedule:
    - cron: '0 4 * * 1'
  workflow_dispatch:
    inputs:
      lanes:
        description: velnor (default) | github | both
        type: choice
        default: velnor
        options: [velnor, github, both]

concurrency:
  group: gitleaks-history-${{ github.ref }}
  cancel-in-progress: false

jobs:
  scan:
    name: Gitleaks history (${{ matrix.config.lane }})
    permissions:
      contents: read
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON((github.event_name == 'workflow_dispatch' && inputs.lanes == 'both') && '[{"lane":"Velnor","runner":["self-hosted","velnor-target-mvp"],"writer":true},{"lane":"GitHub","runner":"ubuntu-26.04","writer":false}]' || (github.event_name == 'workflow_dispatch' && inputs.lanes == 'github') && '[{"lane":"GitHub","runner":"ubuntu-26.04","writer":true}]' || '[{"lane":"Velnor","runner":["self-hosted","velnor-target-mvp"],"writer":true}]') }}
    runs-on: ${{ matrix.config.runner }}
    env:
      MISE_DATA_DIR: ${{ runner.temp }}/mise-data
      MISE_CACHE_DIR: ${{ runner.temp }}/mise-cache
      MISE_CONFIG_DIR: ${{ runner.temp }}/mise-config
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0 # full history is the scanner input
          persist-credentials: false
      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        env:
          MISE_DATA_DIR: ${{ runner.temp }}/mise-data
          MISE_CACHE_DIR: ${{ runner.temp }}/mise-cache
          MISE_CONFIG_DIR: ${{ runner.temp }}/mise-config
        with:
          version: "2026.7.7"
          install_args: gitleaks
          cache_save: ${{ github.ref == 'refs/heads/main' }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - run: gitleaks detect --source . --redact --verbose --no-banner

  gitleaks-required:
    needs: [scan]
    if: always()
    name: Gitleaks required (${{ matrix.config.lane }})
    permissions: {}
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        config: ${{ fromJSON((github.event_name == 'workflow_dispatch' && inputs.lanes == 'both') && '[{"lane":"Velnor","runner":["self-hosted","velnor-target-mvp"],"writer":true},{"lane":"GitHub","runner":"ubuntu-26.04","writer":false}]' || (github.event_name == 'workflow_dispatch' && inputs.lanes == 'github') && '[{"lane":"GitHub","runner":"ubuntu-26.04","writer":true}]' || '[{"lane":"Velnor","runner":["self-hosted","velnor-target-mvp"],"writer":true}]') }}
    runs-on: ${{ matrix.config.runner }}
    steps:
      - env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: echo "$NEEDS_JSON" | jq -e 'to_entries | map(.value.result) | any(. == "failure" or . == "cancelled") | not' >/dev/null
