name: gitleaks history

on:
  schedule:
    - cron: '0 4 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    env:
      GITLEAKS_VERSION: 8.30.1
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Cache gitleaks
        id: cache-gitleaks
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6
        with:
          path: ~/.local/bin/gitleaks
          key: gitleaks-${{ env.GITLEAKS_VERSION }}-linux-x64
      - name: install gitleaks
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.local/bin"
          if [ ! -x "$HOME/.local/bin/gitleaks" ]; then
            curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
              | tar -xz -C "$HOME/.local/bin" gitleaks
          fi
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/gitleaks" version
      - run: gitleaks detect --source . --redact --verbose --no-banner
