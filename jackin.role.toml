version = "v1alpha4"
dockerfile = "Dockerfile"
published_image = "docker.io/projectjackin/jackin-sentinel:latest"
agents = ["claude", "codex", "amp", "kimi", "opencode"]

[identity]
name = "jackin' Sentinel"

[claude]
model = "claude-sonnet-4-6"
plugins = []

[codex]
model = "gpt-5"

[amp]

[kimi]
model = "kimi-k2"

[opencode]
model = "zai-coding-plan/glm-5.1"

[hooks]
setup_once = "hooks/setup-once.sh"
source = "hooks/source.sh"
preflight = "hooks/preflight.sh"

[env.CLAUDE_CODE_NO_FLICKER]
default = "1"

[env.CLAUDE_CODE_MAX_OUTPUT_TOKENS]
default = "64000"

[env.STATIC_DEFAULT]
default = "static-value"

[env.LITERAL_TEMPLATE]
default = "preserve-${other.VALUE}"

[env.FREE_TEXT]
interactive = true
prompt = "Sentinel free text:"
default = "typed-default"

[env.FREE_TEXT_REQUIRED]
interactive = true
prompt = "Required sentinel value:"

[env.SELECT_PROJECT]
interactive = true
options = ["frontend", "backend", "infra"]
prompt = "Select sentinel project:"

[env.SELECT_MODE]
interactive = true
options = ["fast", "thorough", "diagnostic"]
prompt = "Select sentinel mode:"
default = "diagnostic"

[env.OPTIONAL_API_KEY]
interactive = true
skippable = true
prompt = "Optional sentinel API key:"

[env.BRANCH]
interactive = true
depends_on = ["env.SELECT_PROJECT"]
prompt = "Branch for ${env.SELECT_PROJECT}:"
default = "feature/${env.SELECT_PROJECT}"

[env.COMBINED_LABEL]
interactive = true
depends_on = ["env.FREE_TEXT", "env.SELECT_PROJECT"]
prompt = "Combined label for ${env.SELECT_PROJECT}:"
default = "${env.SELECT_PROJECT}-${env.FREE_TEXT}"

[env.OPTIONAL_DERIVED]
interactive = true
skippable = true
depends_on = ["env.OPTIONAL_API_KEY"]
prompt = "Value derived from optional key:"
default = "using-${env.OPTIONAL_API_KEY}"
